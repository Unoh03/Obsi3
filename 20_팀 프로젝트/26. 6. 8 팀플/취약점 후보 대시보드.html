    h2 { margin: 0 0 12px; font-size: 18px; letter-spacing: 0; }
    p { margin: 4px 0; color: var(--muted); }
    a { color: var(--blue); text-decoration: none; }
    main { padding: 18px 28px 32px; }
    section { margin: 0 0 18px; padding-top: 18px; border-top: 1px solid var(--line); }
    .toolbar { display: grid; grid-template-columns: minmax(220px, 1.8fr) repeat(5, minmax(130px, 1fr)) auto; gap: 8px; align-items: end; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; }
    input, select, button { height: 34px; border: 1px solid var(--line); background: var(--surface); color: var(--text); border-radius: 6px; padding: 0 10px; font: inherit; }
    button { cursor: pointer; font-weight: 600; }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .stats { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 8px; margin-top: 12px; }
    .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .stat .value { display: block; font-size: 20px; font-weight: 700; }
    .stat .label { color: var(--muted); font-size: 12px; }
    .table-wrap { overflow: auto; max-height: 68vh; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; }
    th { position: sticky; top: 0; background: #eef2f7; z-index: 1; font-size: 12px; color: #334155; white-space: nowrap; }
    tbody tr:hover { background: #f8fafc; }
    .server-table table { min-width: 760px; }
    .pill { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 12px; font-weight: 700; line-height: 1.5; white-space: nowrap; }
    .p0 { background: #fee2e2; color: var(--danger); }
    .p1 { background: #ffedd5; color: var(--warn); }
    .p2 { background: #dbeafe; color: var(--blue); }
    .p3 { background: #ede9fe; color: var(--purple); }
    .grade-high { background: #fee2e2; color: var(--danger); }
    .grade-mid { background: #fef3c7; color: #92400e; }
    .grade-low { background: #e0f2fe; color: #075985; }
    .grade-unknown { background: #e5e7eb; color: #374151; }
    .owner { background: var(--accent-weak); color: var(--accent); }
    .note { color: var(--muted); max-width: 460px; }
    .compact { white-space: nowrap; }
    @media (max-width: 1100px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 720px) {
      header, main { padding-left: 14px; padding-right: 14px; }

      .stats { grid-template-columns: 1fr 1fr; }

    const ownerOrder = ['운호', '용준', '정원', '공통', '미정'];
    const priorityOrder = ['P0', 'P1', 'P2', 'P3'];
    const filters = ['q', 'priority', 'owner', 'env', 'status', 'grade'].map(id => document.getElementById(id));

    function uniq(values) { return [...new Set(values.filter(Boolean))]; }
    function fillSelect(id, values, order = null) {
      const el = document.getElementById(id);
      const sorted = order ? values.sort((a, b) => order.indexOf(a) - order.indexOf(b)) : values.sort((a, b) => a.localeCompare(b, 'ko'));
      for (const v of sorted) {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        el.appendChild(opt);
      }
    }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function pill(text, cls) { return `<span class="pill ${cls}">${escapeHtml(text)}</span>`; }
    function gradeClass(grade) { return grade === '상' ? 'grade-high' : grade === '중' ? 'grade-mid' : grade === '하' ? 'grade-low' : 'grade-unknown'; }
    function priorityClass(p) { return String(p || '').toLowerCase(); }

    fillSelect('priority', uniq(candidates.map(x => x['우선순위'])), priorityOrder);
    fillSelect('owner', ownerOrder.slice(), ownerOrder);
    fillSelect('env', uniq(candidates.flatMap(x => (x['환경'] || '').split('/'))));
    fillSelect('status', uniq(candidates.map(x => x['상태'])));
    fillSelect('grade', uniq(candidates.map(x => x['PDF 등급'])), ['상', '중', '하', '확인 필요']);

    function filtered() {
      const q = document.getElementById('q').value.trim().toLowerCase();
      const priority = document.getElementById('priority').value;
      const owner = document.getElementById('owner').value;
      const env = document.getElementById('env').value;
      const status = document.getElementById('status').value;
      const grade = document.getElementById('grade').value;
      return candidates.filter(x => {
        const haystack = [x['후보'], x['PDF 항목명'], x['기록'], x['PDF 장'], x['환경'], x['담당']].join(' ').toLowerCase();
        if (q && !haystack.includes(q)) return false;
        if (priority && x['우선순위'] !== priority) return false;
        if (owner && !(x.owners || []).includes(owner)) return false;
        if (env && !(x['환경'] || '').split('/').includes(env)) return false;
        if (status && x['상태'] !== status) return false;
        if (grade && x['PDF 등급'] !== grade) return false;
        return true;
      });
    }
    function renderStats(rows) {
      const stats = [
        ['표시 후보', rows.length],
        ['P0', rows.filter(x => x['우선순위'] === 'P0').length],
        ['P1', rows.filter(x => x['우선순위'] === 'P1').length],
        ['기존 경험', rows.filter(x => x['경험'] === '✅').length],
        ['신규', rows.filter(x => x['상태'] === '신규').length],
        ['설계', rows.filter(x => x['상태'] === '설계').length]
      ];
      document.getElementById('stats').innerHTML = stats.map(([label, value]) => `<div class="stat"><span class="value">${value}</span><span class="label">${label}</span></div>`).join('');
    }
    function renderRows() {
      const rows = filtered().sort((a, b) => priorityOrder.indexOf(a['우선순위']) - priorityOrder.indexOf(b['우선순위']) || a['축'].localeCompare(b['축'], 'ko') || a['후보'].localeCompare(b['후보'], 'ko'));
      renderStats(rows);
      document.querySelector('#candidateTable tbody').innerHTML = rows.map(x => `
        <tr>
          <td class="compact">${pill(x['우선순위'], priorityClass(x['우선순위']))}</td>
          <td>${(x.owners || []).map(o => pill(o, 'owner')).join(' ')}</td>
          <td class="compact">${escapeHtml(x['환경'])}</td>
          <td><strong>${escapeHtml(x['후보'])}</strong><br><span class="note">${escapeHtml(x['축'])}</span></td>
          <td>${escapeHtml(x['PDF 항목명'])}<br><span class="note">${escapeHtml(x['PDF 장'])}</span></td>
          <td class="compact">${pill(x['PDF 등급'], gradeClass(x['PDF 등급']))}</td>
          <td class="compact">${escapeHtml(x['상태'])}</td>
          <td class="compact">${escapeHtml(x['경험'])}</td>
          <td class="compact">${escapeHtml(x['PDF 근거'])}</td>
          <td class="note">${escapeHtml(x['기록'])}</td>
        </tr>`).join('');
    }
    function renderServers() {
      document.getElementById('serverRows').innerHTML = servers.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('');
    }
