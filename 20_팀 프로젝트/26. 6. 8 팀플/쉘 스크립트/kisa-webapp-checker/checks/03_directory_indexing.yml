id: "03"
name: "디렉터리 인덱싱"
kisa_section: "X. Web Application"
required_mode: "safe-active"
description: "Candidate directories are requested and directory listing patterns are checked."
steps:
  - id: directory_listing_probe
    action: path_probe
    summary: "Candidate directories are checked for directory listing output."
    routes:
      - directory_data
      - directory_images
      - directory_uploads
    vulnerable_statuses:
      - 200
    not_vulnerable_statuses:
      - 403
      - 404
    vulnerable_body_patterns:
      - 'Index of /'
      - '<title>Index of'
      - 'Parent Directory'
    no_match_status: "not_vulnerable"
