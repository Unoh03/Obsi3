id: "09"
name: "약한 비밀번호 정책"
kisa_section: "X. Web Application"
required_mode: "state-changing"
description: "Registration and member update routes are identified for weak-password policy checks."
steps:
  - id: weak_password_policy_manual
    action: manual_check
    summary: "Weak password policy testing requires controlled account creation or update; no request is sent by this scaffold."
    routes:
      - register
      - register_submit
      - member_modify
      - member_modify_submit
    payloads_file: "payloads/weak_passwords.yml"
    payload_group: "common_weak"
    status: "manual_required"
    notes:
      - "Later execution should use a disposable account and rollback checklist."
      - "Expected checks include minimum length, common-password blocklist, id inclusion, character classes, and repeated characters."
