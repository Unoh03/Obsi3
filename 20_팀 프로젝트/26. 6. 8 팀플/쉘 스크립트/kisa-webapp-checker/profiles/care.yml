name: care
base_url: "http://127.0.0.1"
source_root: "/var/www/html/care"
target_allowlist:
  - "127.0.0.1"
  - "localhost"
  - "172.168.10.10"
timeout_seconds: 5
verify_tls: false

session:
  cookies:
  headers:

fixtures:
  test_prefix: "kisa-checker-v2"
  note: "Real fixture accounts, posts, and upload files should be defined here when state-changing checks are enabled."

rollback:
  - "Review evidence/<run_id>/rollback_checklist.md before deleting test artifacts."
  - "Remove test posts, accounts, or uploaded files only after screenshots/report evidence are preserved."

routes:
  home:
    method: GET
    path: "/"
  login:
    method: GET
    path: "/member/login.php"
    sensitive: true
  login_submit:
    method: POST
    path: "/member/loginModel.php"
    sensitive: true
    data:
      id: "kisa-v2-user"
      pw: "kisa-v2-password"
  register:
    method: GET
    path: "/member/register.php"
    sensitive: true
  register_submit:
    method: POST
    path: "/member/registerModel.php"
    sensitive: true
    data:
      id: "kisa-v2-user"
      pw: "1234"
      pwCheck: "1234"
      name: "kisa-v2-user"
      mobile: "010-0000-0000"
      address: "kisa-v2-address"
      email: "kisa-v2@example.local"
  member_modify:
    method: GET
    path: "/member/modify.php"
    sensitive: true
  member_modify_submit:
    method: POST
    path: "/member/modifyModel.php"
    sensitive: true
    data:
      pw: "1234"
      pwCheck: "1234"
      name: "kisa-v2-name"
      mobile: "010-0000-0000"
      address: "kisa-v2-address"
      email: "kisa-v2@example.local"
  member_delete:
    method: GET
    path: "/member/delete.php"
    sensitive: true
  member_delete_submit:
    method: POST
    path: "/member/deleteModel.php"
    sensitive: true
    data:
      pw: "1234"
      pwCheck: "1234"
  board_search:
    method: GET
    path: "/center/list.php"
    params:
      mode: "search"
      find: "subject"
      data: "kisa-baseline"
  xss_reflected_proof:
    method: GET
    path: "/vuln/xss/reflected.php"
    params:
      data: "kisa-baseline"
  board_write:
    method: GET
    path: "/center/write.php"
    sensitive: true
  board_write_submit:
    method: POST
    path: "/center/writeModel.php"
    sensitive: true
    data:
      subject: "kisa-v2-subject"
      content: "kisa-v2-content"
  board_view_candidate:
    method: GET
    path: "/center/view.php"
    params:
      num: "1"
  ssrf_fetch:
    method: GET
    path: "/vuln/ssrf/fetch.php"
    params:
      url: "http://172.168.10.10/"
  ssrf_internal_proof:
    method: GET
    path: "/vuln/ssrf/internal-proof.php"
  directory_data:
    method: GET
    path: "/data/"
  directory_images:
    method: GET
    path: "/images/"
  directory_uploads:
    method: GET
    path: "/uploads/"
  error_missing_page:
    method: GET
    path: "/kisa-v1-not-found-404"
  info_dbconn:
    method: GET
    path: "/dbconn.php"
  info_config_local:
    method: GET
    path: "/config.local.php"
  info_git_head:
    method: GET
    path: "/.git/HEAD"
  info_table_create_text:
    method: GET
    path: "/member/%ED%85%8C%EC%9D%B4%EB%B8%94%20%EC%83%9D%EC%84%B1.txt"
  download_known_candidate:
    method: GET
    path: "/center/download.php?filename=14_fake_webshell_proof.php"
  data_upload_proof:
    method: GET
    path: "/data/14_fake_webshell_proof.php"
  admin_root:
    method: GET
    path: "/admin/"
  admin_login:
    method: GET
    path: "/admin/login.php"

method_probe:
  path: "/kisa-method-probe-v0.txt"
  body: "kisa-webapp-checker-v0"
